<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart Study Helper</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>📚 Smart Study Helper</h1>
        <p>Sign in to access your saved topics</p>
      </div>

      <div class="auth-tabs">
        <button id="loginTab" class="auth-tab active">Login</button>
        <button id="registerTab" class="auth-tab">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginUsername">Username or Email</label>
          <input
            type="text"
            id="loginUsername"
            required
            placeholder="Enter your username or email"
          />
          <div class="error-message" id="loginUsernameError"></div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            required
            placeholder="Enter your password"
          />
          <div class="error-message" id="loginPasswordError"></div>
        </div>

        <button type="submit" class="auth-submit-btn">Sign In</button>
        <div class="error-message" id="loginError"></div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="registerUsername">Username</label>
          <input
            type="text"
            id="registerUsername"
            required
            placeholder="Choose a username"
            minlength="3"
          />
          <div class="error-message" id="registerUsernameError"></div>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input
            type="email"
            id="registerEmail"
            required
            placeholder="Enter your email"
          />
          <div class="error-message" id="registerEmailError"></div>
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input
            type="password"
            id="registerPassword"
            required
            placeholder="Create a password"
            minlength="6"
          />
          <div class="error-message" id="registerPasswordError"></div>
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword">Confirm Password</label>
          <input
            type="password"
            id="registerConfirmPassword"
            required
            placeholder="Confirm your password"
          />
          <div class="error-message" id="registerConfirmPasswordError"></div>
        </div>

        <button type="submit" class="auth-submit-btn">Create Account</button>
        <div class="error-message" id="registerError"></div>
      </form>

      <div class="auth-footer">
        <p>By signing in, you agree to save your study topics securely.</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
