<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Helper</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-------------------- Header -------------------->
  
  <header class="site-header">
    <div class="header-top">
      <div class="header-brand">
        <h1>&#x1F4DA; Smart Study Helper</h1>
        <p>Search any topic &mdash; get summaries, related subjects, and quizzes</p>
      </div>
      <div class="header-controls">
        <button id="sidebarToggle" class="icon-btn" aria-label="Open saved topics" aria-expanded="false">&#x2630;</button>
        <button id="darkToggle"    class="icon-btn" aria-label="Switch to dark mode">&#x1F319;</button>
      </div>
    </div>

    <!-- Search bar sits at the bottom of the header, overlapping the content below -->
    <div class="search-wrap">
      <div class="search-box" role="search">
        <input
          id="searchInput"
          type="search"
          placeholder="e.g. Quantum computing, Renaissance, DNA&hellip;"
          autocomplete="off"
          aria-label="Search for a topic"
          spellcheck="false"
        />
        <button id="searchBtn" aria-label="Search">Search</button>
      </div>
      <p class="search-hint">Press <kbd>/</kbd> to focus &bull; Press <kbd>Enter</kbd> to search</p>
    </div>
  </header>

  <!-------------------- Main layout -------------------->
  
  <div class="layout" id="layout">

    <!-- Results panel -->
    <main id="main" aria-label="Search results">
      <div class="empty-state">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
        </svg>
        <h2>Start exploring</h2>
        <p>Type any topic in the search bar above to get a Wikipedia summary, related subjects, and an auto-generated quiz.</p>
      </div>
    </main>

    <!-- Saved topics sidebar -->
    <aside id="sidebar" aria-label="Saved topics"></aside>

  </div>

  <!---------------------- Scripts (order matters) ---------------------->
  
  <script src="js/api.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
